<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ôn Tập Lịch Sử 11 - HKII (2025-2026)</title>
    <style>
        :root { --primary: #1a73e8; --success: #28a745; --error: #dc3545; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--bg); margin: 0; padding: 10px; line-height: 1.5; }
        .container { max-width: 850px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .mode-selector { display: flex; gap: 8px; margin-bottom: 20px; background: #eee; padding: 5px; border-radius: 10px; position: sticky; top: 10px; z-index: 100; }
        .mode-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 14px; }
        .active-mode { background: var(--primary); color: white; }
        h1 { text-align: center; color: var(--primary); font-size: 20px; text-transform: uppercase; margin-bottom: 5px; }
        .year-info { text-align: center; color: #666; font-size: 14px; margin-bottom: 20px; }
        .question-card { border: 1px solid #ddd; padding: 15px; margin-bottom: 15px; border-radius: 8px; border-left: 6px solid var(--primary); }
        .question-text { font-size: 16px; font-weight: 600; color: #1a202c; display: block; margin-bottom: 12px; white-space: pre-line; }
        .option { display: block; padding: 12px; margin: 6px 0; border: 1px solid #e2e8f0; border-radius: 6px; cursor: pointer; font-size: 15px; }
        .option:hover { background: #edf2f7; }
        .opt-correct { background-color: #d4edda !important; border-color: #28a745 !important; color: #155724; font-weight: bold; }
        .opt-wrong { background-color: #f8d7da !important; border-color: #dc3545 !important; color: #721c24; }
        #result-box { display: none; padding: 20px; background: #e8f0fe; border-radius: 10px; margin-bottom: 20px; border: 2px solid var(--primary); text-align: center; }
        #btn-submit { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .feedback { font-weight: bold; margin-top: 10px; display: none; padding: 8px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Ôn Tập Lịch Sử 11 - HKII</h1>
    <div class="year-info">Năm học: 2025-2026</div>
    
    <div class="mode-selector">
        <button class="mode-btn active-mode" id="btn-practice" onclick="setMode('practice')">LUYỆN TẬP (Hiện đáp án)</button>
        <button class="mode-btn" id="btn-exam" onclick="setMode('exam')">THI THỬ (Nộp bài)</button>
    </div>

    <div id="result-box">
        <h2 id="score-text"></h2>
        <button onclick="location.reload()" style="padding: 10px 20px; cursor: pointer; border-radius: 5px; border: none; background: var(--primary); color: white;">Làm lại bài mới</button>
    </div>

    <div id="quiz-container"></div>

    <div id="submit-area" style="display: none;">
        <button id="btn-submit" onclick="submitExam()">NỘP BÀI THI</button>
    </div>
</div>

<script>
const questions = [
    {id: 1, q: "“Một xin rửa sạch nước thù\nHai xin đem lại nghiệp xưa họ Hùng\nBa kẻo oan ức lòng chồng\nBốn xin vẻn vẹn sở công lênh này”\n\nBốn câu thơ trên trích trong “Thiên Nam Ngữ Lục” nói về cuộc khởi nghĩa nào?", options: ["Khúc Thừa Dụ", "Lý Bí.", "Hai Bà Trưng.", "Phùng Hưng."], a: "Hai Bà Trưng."},
    {id: 2, q: "“Tôi chỉ muốn cưỡi cơn gió mạnh, đạp luồng sóng dữ, chém cá kình ở biển Đông, đánh đuổi quân Ngô, giành lại giang san, cởi ách nô lệ, há chịu cúi đầu làm tì thiếp cho người ta!”.\n\nCâu nói trên là của nhân vật nào?", options: ["Bà Triệu (Triệu Thị Trinh).", "Bà Trưng Trắc.", "Nữ tướng Bùi Thị Xuân.", "Công chúa Lê Ngọc Hân."], a: "Bà Triệu (Triệu Thị Trinh)."},
    {id: 3, q: "Khởi nghĩa Lam Sơn (1418-1427) diễn ra trong bối cảnh nào sau đây?", options: ["Đại Việt bị nhà Nguyên cai trị.", "Đại Việt bị nhà Minh đô hộ.", "Đại Việt bị chia cắt làm hai Đàng.", "Đại Việt có độc lập, chủ quyền."], a: "Đại Việt bị nhà Minh đô hộ."},
    {id: 4, q: "Sau khi lên ngôi và lập ra nhà Hồ, Hồ Quý Ly đã", options: ["tổ chức kháng chiến chống quân Xiêm.", "tạo ra cục diện chiến tranh Nam-Bắc triều.", "mở rộng lãnh thổ Đại Việt về phía Nam.", "đã thực hiện nhiều chính sách cải cách."], a: "đã thực hiện nhiều chính sách cải cách."},
    {id: 5, q: "Năm 1397, Hồ Quý Ly ban hành chính sách hạn điền nhằm mục đích", options: ["chia ruộng đất công cho nông dân nghèo.", "hạn chế sở hữu ruộng đất quy mô lớn của tư nhân.", "bảo vệ sức kéo cho sản xuất nông nghiệp.", "xóa bỏ tình trạng che giấu, gian dối về ruộng đất."], a: "hạn chế sở hữu ruộng đất quy mô lớn của tư nhân."},
    {id: 6, q: "Dưới triều Hồ, những tôn giáo nào bị suy giảm vai trò và vị trí so với các triều đại trước?", options: ["Nho giáo và đạo giáo.", "Phật giáo và Đạo giáo.", "Hin-đu giáo và Hồi giáo.", "Đạo Thiên chúa và Phật giáo."], a: "Phật giáo và Đạo giáo."},
    {id: 7, q: "Mô hình tổ chức hành chính nào sau đây thuộc thời Lê sơ sau cải cách hành chính của vua Lê Thánh Tông?", options: ["Đạo, lộ, phủ, châu, hương, giáp, xã.", "Đạo thừa tuyên, phủ, huyện, châu, xã.", "Lộ, trấn, đạo, phủ, châu, giáp, xã.", "Lộ, hương, đạo, phủ, châu, huyện, xã."], a: "Đạo thừa tuyên, phủ, huyện, châu, xã."},
    {id: 8, q: "Bộ luật nào dưới đây được đánh giá là có nhiều điểm mới và tiến bộ so với các bộ luật khác thời phong kiến?", options: ["Hình luật.", "Hình thư.", "Quốc triều hình luật.", "Hoàng Việt luật lệ."], a: "Quốc triều hình luật."},
    {id: 9, q: "Dưới thời vua Lê Thánh Tông, hệ thống quan lại được tuyển chọn chủ yếu thông qua", options: ["dòng dõi tôn thất.", "tiến cử.", "giáo dục – khoa cử.", "đề cử."], a: "giáo dục – khoa cử."},
    {id: 10, q: "Năm 1471, ở địa phương, vua Lê Thánh Tông chia đất nước thành", options: ["10 đạo thừa tuyên và phủ Trung Đô.", "11 đạo thừa tuyên và phủ Trung Đô.", "12 đạo thừa tuyên và phủ Trung Đô.", "13 đạo thừa tuyên và phủ Trung Đô."], a: "13 đạo thừa tuyên và phủ Trung Đô."},
    {id: 11, q: "Để phát triển kinh tế, vua Lê Thánh Tông đã ban hành các chính sách", options: ["lập quan Hà đê sứ và quan quân điền.", "cho đào kênh máng, đắp đê “quai vạc”.", "lập quan Hà đê sứ và đắp đê “quai vạc”.", "chế độ lộc điền và chế độ quân điền."], a: "chế độ lộc điền và chế độ quân điền."},
    {id: 12, q: "Để tôn vinh những người đỗ đại khoa, vua Lê Thánh Tông đã", options: ["phong làm quan đại thần.", "dựng bia đá ở Văn Miếu.", "cấp bằng Thạc sĩ, Tiến sĩ.", "cử làm thầy đồ dạy học."], a: "dựng bia đá ở Văn Miếu."},
    {id: 13, q: "Bộ máy nhà nước phong kiến trung quyền của nước Đại Việt được tổ chức hoàn chỉnh dưới triều vua nào?", options: ["Lý Thái Tổ.", "Trần Thánh Tông.", "Lê Thái Tông.", "Lê Thánh Tông."], a: "Lê Thánh Tông."},
    {id: 14, q: "Kế sách nào của Ngô Quyền đã được quân dân nhà Trần kế thừa để đánh đuổi quân Nguyên (1288)?", options: ["Tiên phát chế nhân.", "Đánh thành diệt viện.", "Vườn không nhà trống.", "Đóng cọc trên sông Bạch Đằng"], a: "Đóng cọc trên sông Bạch Đằng"},
    {id: 15, q: "Câu nói: “...vua tôi đồng tâm, anh em hòa mục, cả nước nhà góp sức, giặc phải bị bắt...” khẳng định bài học nào?", options: ["Phát huy truyền thống trong đánh giặc, giữ nước.", "Kết hợp giữa truyền thống yêu nước với lao động sản xuất.", "Phát huy sức mạnh đại đoàn kết dân tộc.", "Chiến thuật bao vây tiêu diệt giặc."], a: "Phát huy sức mạnh đại đoàn kết dân tộc."},
    {id: 16, q: "Chiến thắng Bạch Đằng của Ngô Quyền năm 938 có ý nghĩa nào sau đây?", options: ["Buộc quân Nam Hán phải từ bỏ mộng xâm lược nước ta.", "Nâng cao vị thế của nước ta trong khu vực.", "Mở ra thời đại độc lập, tự chủ lâu dài của dân tộc.", "Để lại bài học về khoan thư sức dân."], a: "Mở ra thời đại độc lập, tự chủ lâu dài của dân tộc."},
    {id: 17, q: "Sử cũ viết: “...trong bụng thì sợ quân Tây Sơn như sợ cọp”, chứng tỏ điều gì?", options: ["Những tên lính Xiêm vô cùng sợ hãi.", "Cách đánh giặc tài tình của quân Tây Sơn.", "Khẳng định uy tín và sức mạnh của phong trào Tây Sơn.", "Quân Xiêm không dám sang xâm lược nước ta."], a: "Khẳng định uy tín và sức mạnh của phong trào Tây Sơn."},
    {id: 18, q: "“Bạch Đằng nhất trận hỏa công.\nTặc binh đại phá, huyết hồng mãn giang”.\nHai câu thơ trên nói đến sự kiện nào?", options: ["Chiến thắng trên sông Bạch Đằng năm 1288.", "Chiến thắng Chi Lăng – Xương Giang năm 1427.", "Chiến thắng Ngọc Hồi – Đống Đa năm 1789.", "Chiến thắng Rạch Gầm – Xoài Mút năm 1785."], a: "Chiến thắng trên sông Bạch Đằng năm 1288."},
    {id: 19, q: "Nguyên nhân quyết định dẫn đến thắng lợi của khởi nghĩa Lam Sơn (1418-1427) là", options: ["do tương quan lực lượng theo hướng có lợi.", "quân Minh thiếu quyết tâm, thiếu lương thực.", "nghĩa quân có kỷ luật cao, vũ khí tốt.", "nhân dân Việt Nam có lòng yêu nước, quyết tâm đuổi giặc."], a: "nhân dân Việt Nam có lòng yêu nước, quyết tâm đuổi giặc."},
    {id: 20, q: "Một trong những điểm khác biệt của KN Lam Sơn so với kháng chiến chống Tống thời Lý là", options: ["diễn ra qua hai giai đoạn.", "diễn ra khi đất nước đã mất độc lập.", "được đông đảo nhân dân tham gia.", "có sự tham gia của nhiều tướng giỏi."], a: "diễn ra khi đất nước đã mất độc lập."},
    {id: 21, q: "Đặc điểm nổi bật nhất trong các cuộc khởi nghĩa thời kì Bắc thuộc là", options: ["không có người lãnh đạo.", "diễn ra liên tục và mạnh mẽ.", "kết quả đều giành thắng lợi.", "chỉ có nhân dân tham gia đấu tranh."], a: "diễn ra liên tục và mạnh mẽ."},
    {id: 22, q: "“Tướng sĩ một lòng phụ tử, hòa nước sông chén rượu ngọt ngào”.\nĐiều đó thể hiện truyền thống nào của dân tộc Việt Nam?", options: ["Truyền thống đoàn kết.", "Truyền thống yêu nước.", "Truyền thống hiếu học.", "Truyền thống hiếu thảo."], a: "Truyền thống đoàn kết."},
    {id: 23, q: "Nghệ thuật quân sự thời Lý được kế thừa và phát huy trong khởi nghĩa Lam Sơn là:", options: ["Kế sách “tiên phát chế nhân”.", "Chủ động kết thúc chiến tranh.", "Kế sách “thanh dã”.", "Đánh nhanh thắng nhanh."], a: "Chủ động kết thúc chiến tranh."},
    {id: 24, q: "Các cuộc KN chống Bắc thuộc, KN Lam Sơn, phong trào Tây Sơn thắng lợi đều có nguyên nhân chủ quan chung là", options: ["tinh thần yêu nước, đoàn kết của nhân dân.", "sự mất đoàn kết trong nội bộ kẻ xâm lược.", "địa hình phức tạp, khí hậu khắc nghiệt.", "có vũ khí hiện đại, quân đội đông đảo."], a: "tinh thần yêu nước, đoàn kết của nhân dân."},
    {id: 25, q: "Nội dung phản ánh rõ nét tính đại chúng trong cải cách giáo dục của Hồ Quý Ly?", options: ["Dạy văn chương chữ Nôm cho phi tần, cung nữ.", "Chú trọng tổ chức các kì thi đông người đỗ.", "Mở trường học ở các lộ, phủ, châu, cử các quan trông coi.", "Sửa đổi chế độ thi cử, làm toán."], a: "Mở trường học ở các lộ, phủ, châu, cử các quan trông coi."},
    {id: 26, q: "Cải cách của Hồ Quý Ly cuối thế kỉ XIV đầu thế kỉ XV có điểm tiến bộ nào sau đây?", options: ["Nho giáo trở thành tư tưởng chủ đạo.", "Nền giáo dục, khoa cử từng bước phát triển.", "Thể hiện tinh thần dân tộc, ý thức tự cường.", "Xác lập thể chế quân chủ trung ương tập quyền."], a: "Thể hiện tinh thần dân tộc, ý thức tự cường."},
    {id: 27, q: "Bài học quan trọng nhất rút ra từ sự thất bại của nhà Hồ là gì?", options: ["Tập hợp sức mạnh đoàn kết toàn dân tộc, sự ủng hộ của nhân dân.", "Xây dựng lực lượng quân đội hùng mạnh.", "Tăng cường huấn luyện, xây dựng phòng thủ.", "Đoàn kết với các nước láng giềng."], a: "Tập hợp sức mạnh đoàn kết toàn dân tộc, sự ủng hộ của nhân dân."},
    {id: 28, q: "Nội dung nào sau đây KHÔNG đúng về kết quả cuộc cải cách của Hồ Quý Ly?", options: ["Góp phần nâng cao tiềm lực quốc phòng.", "Giúp nông dân có thêm ruộng đất để sản xuất.", "Văn hoá dân tộc, nhất là chữ Nôm được đề cao.", "Giữ vững nền độc lập dài lâu cho dân tộc."], a: "Giữ vững nền độc lập dài lâu cho dân tộc."},
    {id: 29, q: "Nội dung phản ánh ĐÚNG về nhận định: “Hồ Quý Ly là một nhà cải cách lớn, kiên quyết và táo bạo”?", options: ["Thực hiện cuộc cải cách trên nhiều lĩnh vực, phần nào đáp ứng được yêu cầu lịch sử.", "Tiến hành cải cách, chưa đáp ứng được yêu cầu lịch sử.", "Dù chưa thoát khỏi khủng hoảng nhưng giữ được độc lập.", "Chưa đưa đất nước thoát khỏi khủng hoảng và không giữ được độc lập."], a: "Thực hiện cuộc cải cách trên nhiều lĩnh vực, phần nào đáp ứng được yêu cầu lịch sử."},
    {id: 30, q: "Nội dung phản ánh đúng mục đích cải cách hành chính của vua Lê Thánh Tông?", options: ["Tăng cường quyền lực của hoàng đế và củng cố bộ máy nhà nước.", "Giải quyết tình trạng khủng hoảng trầm trọng.", "Biến nước ta trở thành cường quốc hàng đầu.", "Tăng cường tiềm lực chuẩn bị đối phó ngoại xâm."], a: "Tăng cường quyền lực của hoàng đế và củng cố bộ máy nhà nước."},
    {id: 31, q: "Nội dung nào sau đây phản ánh đúng về chức năng của lục Bộ thời vua Lê Thánh Tông?", options: ["Cơ quan giúp việc cho lục Tự.", "Theo dõi, giám sát hoạt động của lục Khoa.", "Cơ quan cao cấp chủ chốt trong triều đình.", "Phụ trách hoạt động quân sự của nhà nước."], a: "Cơ quan cao cấp chủ chốt trong triều đình."},
    {id: 32, q: "Nội dung nào sau đây phản ánh đúng về cuộc cải cách dưới triều vua Lê Thánh Tông?", options: ["Có tính kế thừa từ trung ương đến địa phương.", "Có sự nối tiếp từ trung ương đến địa phương.", "Có tính liên thông từ trung ương đến địa phương.", "Có tính đồng bộ từ trung ương đến địa phương."], a: "Có tính đồng bộ từ trung ương đến địa phương."},
    {id: 33, q: "Điểm tương đồng về xây dựng cán bộ thời Lê Thánh Tông và hiện nay là:", options: ["có năng lực và phẩm chất tốt.", "có năng lực, xuất thân dòng tộc.", "ưu tiên tuyển chọn con em quan lại.", "chỉ chú trọng con cháu người có công."], a: "có năng lực và phẩm chất tốt."},
    {id: 34, q: "Cải cách hành chính của Lê Thánh Tông đã khắc phục được hạn chế nào?", options: ["Tranh giành địa vị của các hoàng tử.", "Sự cấu kết của các chức quan đại thần.", "Bóc lột nông dân của quan địa phương.", "Sự chuyên quyền và nguy cơ cát cứ."], a: "Sự chuyên quyền và nguy cơ cát cứ."},
    {id: 35, q: "Mô hình quân chủ thời Lê sơ ảnh hưởng thế nào đến giai đoạn sau?", options: ["Mô hình thử nghiệm cho các triều đại.", "Trở thành khuôn mẫu cho các triều đại về sau.", "Đặt nền móng cho chế độ phong kiến.", "Hình mẫu thí điểm cho các triều đại."], a: "Trở thành khuôn mẫu cho các triều đại về sau."}
];

let currentMode = 'practice';

function renderQuiz() {
    const container = document.getElementById('quiz-container');
    container.innerHTML = '';
    questions.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'question-card';
        card.id = `q-${item.id}`;
        let optionsHTML = '';
        item.options.forEach(opt => {
            optionsHTML += `<div class="option" onclick="handleSelect(this, ${item.id}, '${opt.replace(/'/g, "\\'")}', '${item.a.replace(/'/g, "\\'")}')">
                <input type="radio" name="q${item.id}" value="${opt}" style="pointer-events:none"> ${opt}
            </div>`;
        });
        card.innerHTML = `<span class="question-text">Câu ${index + 1}: ${item.q}</span>${optionsHTML}<div class="feedback" id="fb-${item.id}"></div>`;
        container.appendChild(card);
    });
}

function setMode(mode) {
    currentMode = mode;
    document.getElementById('btn-practice').classList.toggle('active-mode', mode === 'practice');
    document.getElementById('btn-exam').classList.toggle('active-mode', mode === 'exam');
    document.getElementById('submit-area').style.display = (mode === 'exam') ? 'block' : 'none';
    document.getElementById('result-box').style.display = 'none';
    renderQuiz();
    window.scrollTo(0,0);
}

function handleSelect(el, qId, selected, correct) {
    const card = document.getElementById(`q-${qId}`);
    const fb = document.getElementById(`fb-${qId}`);
    const options = card.querySelectorAll('.option');

    if (currentMode === 'practice') {
        options.forEach(o => o.style.pointerEvents = 'none');
        fb.style.display = 'block';
        if (selected.trim() === correct.trim()) {
            el.classList.add('opt-correct');
            fb.innerHTML = "✓ Chính xác!"; fb.style.backgroundColor = "#d4edda"; fb.style.color = "#155724";
        } else {
            el.classList.add('opt-wrong');
            fb.innerHTML = `✗ Sai rồi! Đáp án đúng là: ${correct}`; fb.style.backgroundColor = "#f8d7da"; fb.style.color = "#721c24";
            options.forEach(o => { if(o.innerText.trim() === correct.trim()) o.classList.add('opt-correct'); });
        }
    } else {
        options.forEach(o => o.style.backgroundColor = '');
        el.style.backgroundColor = '#e8f0fe';
        el.querySelector('input').checked = true;
    }
}

function submitExam() {
    let score = 0;
    questions.forEach(item => {
        const card = document.getElementById(`q-${item.id}`);
        const sel = card.querySelector('input:checked');
        const opts = card.querySelectorAll('.option');
        const fb = document.getElementById(`fb-${item.id}`);
        fb.style.display = 'block';
        if (sel && sel.value.trim() === item.a.trim()) {
            score++; card.style.borderColor = "var(--success)"; fb.innerHTML = "✓ Đúng"; fb.style.color="green";
        } else {
            card.style.borderColor = "var(--error)"; fb.innerHTML = "✗ Đáp án đúng: " + item.a; fb.style.color="red";
            opts.forEach(o => { if(o.innerText.trim() === item.a.trim()) o.classList.add('opt-correct'); });
        }
    });
    window.scrollTo({top:0, behavior:'smooth'});
    document.getElementById('result-box').style.display = 'block';
    document.getElementById('score-text').innerText = `KẾT QUẢ THI THỬ: ${score} / ${questions.length} CÂU ĐÚNG`;
    document.getElementById('submit-area').style.display = 'none';
}

renderQuiz();
</script>
