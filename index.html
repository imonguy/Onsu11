<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ôn Tập Lịch Sử 11 - HKII</title>
    <style>
        :root {
            --primary: #1a73e8;
            --success: #28a745;
            --error: #dc3545;
            --bg: #f0f2f5;
        }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--bg); margin: 0; padding: 15px; color: #333; }
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* Menu chuyển chế độ */
        .mode-selector { display: flex; gap: 10px; margin-bottom: 25px; background: #eee; padding: 5px; border-radius: 10px; }
        .mode-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .active-mode { background: var(--primary); color: white; }

        h1 { text-align: center; color: var(--primary); margin-top: 0; }
        .question-card { border: 1px solid #ddd; padding: 15px; margin-bottom: 15px; border-radius: 10px; border-left: 5px solid var(--primary); }
        .question-text { font-size: 17px; font-weight: bold; margin-bottom: 12px; display: block; }
        .option { display: block; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; }
        .option:hover { background: #f8f9fa; }
        
        /* Hiệu ứng màu sắc */
        .opt-correct { background-color: #d4edda !important; border-color: #28a745 !important; color: #155724; font-weight: bold; }
        .opt-wrong { background-color: #f8d7da !important; border-color: #dc3545 !important; color: #721c24; }
        
        #submit-area { margin-top: 20px; text-align: center; }
        #btn-submit { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
        #result-box { display: none; padding: 20px; background: #e8f0fe; border-radius: 10px; margin-bottom: 20px; border: 2px solid var(--primary); text-align: center; }
        .feedback { font-weight: bold; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>ÔN TẬP LỊCH SỬ 11</h1>
    
    <div class="mode-selector">
        <button class="mode-btn active-mode" id="btn-practice" onclick="setMode('practice')">LUYỆN TẬP</button>
        <button class="mode-btn" id="btn-exam" onclick="setMode('exam')">THI THỬ</button>
    </div>

    <div id="result-box">
        <h2 id="score-text"></h2>
        <button onclick="location.reload()">Làm lại bài</button>
    </div>

    <div id="quiz-container"></div>

    <div id="submit-area" style="display: none;">
        <button id="btn-submit" onclick="submitExam()">NỘP BÀI THI</button>
    </div>
</div>

<script>
const questions = [
    {id: 1, q: "Bốn câu thơ trong 'Thiên Nam Ngữ Lục' nói về cuộc khởi nghĩa nào?", options: ["Khúc Thừa Dụ", "Lý Bí", "Hai Bà Trưng", "Phùng Hưng"], a: "Hai Bà Trưng"},
    {id: 2, q: "Câu nói 'Tôi chỉ muốn cưỡi cơn gió mạnh, đạp luồng sóng dữ...' là của ai?", options: ["Bà Triệu (Triệu Thị Trinh)", "Bà Trưng Trắc", "Bùi Thị Xuân", "Lê Ngọc Hân"], a: "Bà Triệu (Triệu Thị Trinh)"},
    {id: 3, q: "Khởi nghĩa Lam Sơn (1418-1427) diễn ra trong bối cảnh nào?", options: ["Đại Việt bị nhà Nguyên cai trị", "Đại Việt bị nhà Minh đô hộ", "Đại Việt bị chia cắt", "Đại Việt có chủ quyền"], a: "Đại Việt bị nhà Minh đô hộ"},
    {id: 4, q: "Hồ Quý Ly đã thực hiện chính sách gì sau khi lên ngôi?", options: ["Kháng chiến chống Xiêm", "Cục diện Nam-Bắc triều", "Nhiều chính sách cải cách", "Mở rộng lãnh thổ"], a: "Nhiều chính sách cải cách"},
    {id: 5, q: "Năm 1397, Hồ Quý Ly ban hành chính sách hạn điền nhằm mục đích gì?", options: ["Chia ruộng cho dân", "Hạn chế sở hữu ruộng đất tư nhân", "Bảo vệ sức kéo", "Xóa bỏ gian dối"], a: "Hạn chế sở hữu ruộng đất tư nhân"},
    {id: 6, q: "Dưới triều Hồ, tôn giáo nào bị suy giảm vai trò?", options: ["Nho giáo và Đạo giáo", "Phật giáo và Đạo giáo", "Hồi giáo", "Thiên Chúa giáo"], a: "Phật giáo và Đạo giáo"},
    {id: 7, q: "Mô hình hành chính sau cải cách của Lê Thánh Tông là gì?", options: ["Đạo, lộ, phủ, châu, xã", "Đạo thừa tuyên, phủ, huyện, châu, xã", "Lộ, trấn, phủ, châu, xã", "Lộ, đạo, phủ, huyện, xã"], a: "Đạo thừa tuyên, phủ, huyện, châu, xã"},
    {id: 8, q: "Bộ luật nào tiến bộ nhất thời phong kiến Việt Nam?", options: ["Hình luật", "Hình thư", "Quốc triều hình luật", "Hoàng Việt luật lệ"], a: "Quốc triều hình luật"},
    {id: 9, q: "Vua Lê Thánh Tông tuyển chọn quan lại chủ yếu qua:", options: ["Dòng dõi", "Tiến cử", "Giáo dục – khoa cử", "Mua quan"], a: "Giáo dục – khoa cử"},
    {id: 10, q: "Năm 1471, nước ta chia thành bao nhiêu đạo thừa tuyên?", options: ["12 đạo", "13 đạo thừa tuyên và phủ Trung Đô", "10 đạo", "15 đạo"], a: "13 đạo thừa tuyên và phủ Trung Đô"},
    {id: 11, q: "Vua Lê Thánh Tông ban hành chính sách kinh tế nào?", options: ["Quân điền và lộc điền", "Ngụ binh ư nông", "Hà đê sứ", "Hạn điền"], a: "Quân điền và lộc điền"},
    {id: 12, q: "Để tôn vinh người đỗ đạt, vua Lê Thánh Tông đã:", options: ["Phong tước hầu", "Dựng bia đá tại Văn Miếu", "Thưởng vàng", "Gả công chúa"], a: "Dựng bia đá tại Văn Miếu"},
    {id: 13, q: "Bộ máy nhà nước phong kiến hoàn chỉnh nhất dưới thời:", options: ["Lý Công Uẩn", "Trần Nhân Tông", "Lê Thánh Tông", "Lê Thái Tổ"], a: "Lê Thánh Tông"},
    {id: 14, q: "Trần Hưng Đạo kế thừa kế sách nào của Ngô Quyền năm 1288?", options: ["Tiên phát chế nhân", "Đóng cọc trên sông Bạch Đằng", "Vây thành", "Thanh dã"], a: "Đóng cọc trên sông Bạch Đằng"},
    {id: 15, q: "Câu 'vua tôi đồng tâm, anh em hòa mục' nói về:", options: ["Nghệ thuật quân sự", "Sức mạnh đại đoàn kết", "Cách đánh du kích", "Sự giàu có"], a: "Sức mạnh đại đoàn kết"},
    {id: 16, q: "Ý nghĩa lớn nhất của chiến thắng Bạch Đằng 938?", options: ["Kết thúc 1000 năm Bắc thuộc", "Đánh tan quân Tống", "Mở mang bờ cõi", "Lật đổ nhà Đường"], a: "Kết thúc 1000 năm Bắc thuộc"},
    {id: 17, q: "Quân Xiêm 'sợ Tây Sơn như sợ cọp' sau trận nào?", options: ["Ngọc Hồi - Đống Đa", "Rạch Gầm - Xoài Mút", "Chi Lăng", "Phù Ly"], a: "Rạch Gầm - Xoài Mút"},
    {id: 18, q: "'Bạch Đằng nhất trận hỏa công' là nói về năm nào?", options: ["938", "981", "1288", "1785"], a: "1288"},
    {id: 19, q: "Nguyên nhân quyết định thắng lợi của khởi nghĩa Lam Sơn?", options: ["Vũ khí", "Địa hình", "Lòng yêu nước và đoàn kết", "Nhà Minh suy yếu"], a: "Lòng yêu nước và đoàn kết"},
    {id: 20, q: "Điểm khác của KN Lam Sơn so với chống Tống thời Lý?", options: ["Đánh khi đã mất nước", "Đánh khi đang có độc lập", "Có tướng giỏi", "Dùng ngoại giao"], a: "Đánh khi đã mất nước"},
    {id: 21, q: "Đặc điểm nổi bật của các cuộc KN thời Bắc thuộc?", options: ["Thất bại nhanh", "Diễn ra liên tục, mạnh mẽ", "Quy mô nhỏ", "Do vua lãnh đạo"], a: "Diễn ra liên tục, mạnh mẽ"},
    {id: 22, q: "'Tướng sĩ một lòng phụ tử' thể hiện:", options: ["Hiếu học", "Đoàn kết", "Nhân đạo", "Cần cù"], a: "Đoàn kết"},
    {id: 23, q: "Nghệ thuật 'Chủ động kết thúc chiến tranh' áp dụng ở:", options: ["Chống Tống", "Chống Mông Nguyên", "KN Lam Sơn", "Tất cả các ý trên"], a: "Tất cả các ý trên"},
    {id: 24, q: "Nguyên nhân chủ quan chung thắng lợi các cuộc đấu tranh?", options: ["Quân địch yếu", "Tinh thần yêu nước và lãnh đạo giỏi", "Thời tiết", "Vũ khí"], a: "Tinh thần yêu nước và lãnh đạo giỏi"},
    {id: 25, q: "Tính đại chúng trong giáo dục của Hồ Quý Ly?", options: ["Mở trường ở các lộ, phủ, châu", "Dạy chữ Nôm", "Thi gắt gao", "Bỏ thi"], a: "Mở trường ở các lộ, phủ, châu"},
    {id: 26, q: "Điểm tiến bộ nhất trong cải cách của Hồ Quý Ly?", options: ["Tính dân tộc và tự cường", "Xây thành", "Dùng tiền giấy", "Hạn nô"], a: "Tính dân tộc và tự cường"},
    {id: 27, q: "Bài học từ sự thất bại của nhà Hồ?", options: ["Xây thành cao", "Nhiều súng", "Dựa vào sức mạnh toàn dân", "Cầu viện"], a: "Dựa vào sức mạnh toàn dân"},
    {id: 28, q: "Nhận định SAI về cải cách của Hồ Quý Ly?", options: ["Nâng tiềm lực", "Đề cao văn hóa", "Giúp giữ nước lâu dài", "Tính quyết liệt"], a: "Giúp giữ nước lâu dài"},
    {id: 29, q: "Nhận định ĐÚNG về cải cách của Hồ Quý Ly?", options: ["Đáp ứng yêu cầu lịch sử nhưng chưa triệt để", "Thất bại hoàn toàn", "Làm đất nước yếu", "Lợi ích cá nhân"], a: "Đáp ứng yêu cầu lịch sử nhưng chưa triệt để"},
    {id: 30, q: "Mục đích cải cách hành chính của Lê Thánh Tông?", options: ["Tập trung quyền lực vào tay vua", "Phân tán quyền lực", "Bớt quan", "Chống nhà Minh"], a: "Tập trung quyền lực vào tay vua"},
    {id: 31, q: "Lục Bộ thời Lê Thánh Tông có chức năng:", options: ["Tư vấn", "Thực thi việc nước cao cấp", "Giám sát vua", "Thi cử"], a: "Thực thi việc nước cao cấp"},
    {id: 32, q: "Đặc điểm cải cách của Lê Thánh Tông?", options: ["Chỉ ở trung ương", "Đồng bộ trung ương đến địa phương", "Chỉ quân sự", "Theo phương Tây"], a: "Đồng bộ trung ương đến địa phương"},
    {id: 33, q: "Tương đồng tuyển chọn quan lại thời Lê và nay?", options: ["Dòng dõi", "Năng lực và phẩm chất qua thi tuyển", "Tiền bạc", "Ưu tiên người già"], a: "Năng lực và phẩm chất qua thi tuyển"},
    {id: 34, q: "Cải cách Lê Thánh Tông giúp khắc phục:", options: ["Nạn đói", "Sự chuyên quyền và nguy cơ cát cứ", "Quân xâm lược", "Bệnh dịch"], a: "Sự chuyên quyền và nguy cơ cát cứ"},
    {id: 35, q: "Mô hình quân chủ thời Lê Sơ ảnh hưởng đời sau:", options: ["Bị bãi bỏ", "Trở thành khuôn mẫu đời sau", "Dùng 10 năm", "Không giá trị"], a: "Trở thành khuôn mẫu đời sau"}
];

let currentMode = 'practice';

function renderQuiz() {
    const container = document.getElementById('quiz-container');
    container.innerHTML = '';
    questions.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'question-card';
        card.id = `q-${item.id}`;
        
        let optionsHTML = '';
        item.options.forEach(opt => {
            optionsHTML += `
                <div class="option" onclick="handleSelect(this, ${item.id}, '${opt}', '${item.a}')">
                    <input type="radio" name="q${item.id}" value="${opt}" style="pointer-events: none;"> ${opt}
                </div>
            `;
        });

        card.innerHTML = `<span class="question-text">Câu ${index + 1}: ${item.q}</span>${optionsHTML}`;
        container.appendChild(card);
    });
}

function setMode(mode) {
    currentMode = mode;
    document.getElementById('btn-practice').classList.toggle('active-mode', mode === 'practice');
    document.getElementById('btn-exam').classList.toggle('active-mode', mode === 'exam');
    document.getElementById('submit-area').style.display = (mode === 'exam') ? 'block' : 'none';
    document.getElementById('result-box').style.display = 'none';
    renderQuiz();
}

function handleSelect(el, qId, selectedOpt, correctOpt) {
    if (currentMode === 'practice') {
        const card = document.getElementById(`q-${qId}`);
        const options = card.querySelectorAll('.option');
        
        // Vô hiệu hóa nhấn lại
        options.forEach(opt => opt.style.pointerEvents = 'none');
        
        if (selectedOpt === correctOpt) {
            el.classList.add('opt-correct');
        } else {
            el.classList.add('opt-wrong');
            // Hiện đáp án đúng
            options.forEach(opt => {
                if (opt.innerText.trim() === correctOpt) opt.classList.add('opt-correct');
            });
        }
    } else {
        // Chế độ Thi thử: Chỉ đánh dấu chọn
        const card = document.getElementById(`q-${qId}`);
        card.querySelectorAll('.option').forEach(opt => opt.style.backgroundColor = '');
        el.style.backgroundColor = '#e8f0fe';
        el.querySelector('input').checked = true;
    }
}

function submitExam() {
    let score = 0;
    questions.forEach(item => {
        const card = document.getElementById(`q-${item.id}`);
        const selected = card.querySelector('input:checked');
        const options = card.querySelectorAll('.option');
        
        if (selected && selected.value === item.a) {
            score++;
            card.classList.add('opt-correct');
        } else {
            card.classList.add('opt-wrong');
            options.forEach(opt => {
                if (opt.innerText.trim() === item.a) opt.classList.add('opt-correct');
            });
        }
    });
    
    window.scrollTo({top: 0, behavior: 'smooth'});
    document.getElementById('result-box').style.display = 'block';
    document.getElementById('score-text').innerText = `KẾT QUẢ: ${score} / ${questions.length} CÂU ĐÚNG`;
    document.getElementById('submit-area').style.display = 'none';
}

renderQuiz();
</script>
</body>
</html>
